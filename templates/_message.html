<style>
    .flash-container { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    .success { color: green; border: 1px solid green; padding: 10px; }
    .info { color: blue; border: 1px solid blue; padding: 10px; }
    .error { color: red; border: 1px solid red; padding: 10px; }
    .msg-check { display: none; }
    .flash-box { position: relative; min-width: 250px; padding: 15px 45px 15px 15px; margin-bottom: 10px; border: 1px solid; border-radius: 6px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); display: block; }
    .msg-check:checked + .flash-box { display: none;}
    .close-btn { position: absolute; top: 50%; right: 15px; transform: translateY(-50%); cursor: pointer; font-size: 22px; font-weight: bold; line-height: 1; opacity: 0.6; }
    .close-btn:hover { opacity: 1; }

</style>
    

    
<header class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <input type="checkbox" id="msg-{{  loop.index  }}" class="msg-check">

                <div class="flash-box {{  category  }}">
                    {{  message  }}
                    <label for="msg-{{  loop.index  }}" class="close-btn">&times;</label>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</header>
