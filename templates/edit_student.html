<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            Edit Student
        </title>
    </head>

    <body>
        {% include "_message.html" %}
        <form method="POST">
            <div>
                <label>Full Name</label>
                <input type="text" name="full_name" value="{{  student.full_name  }}" required>
            </div>

            <div>
                <label>Branch</label>
                <input type="text" name="branch" value="{{  student.branch  }}" required>
            </div>

            <div>
                <label>CGPA</label>
                <input type="number" step="0.01" name="cgpa" value="{{  student.cgpa  }}" required>
            </div>

            <div>
                <label>Resume URL</label>
                <input type="url" name="resume_url" value="{{  student.resume_url}}" required>
            </div>

            <button type="submit">[Update]</button>
            <a href="{{ url_for('admin_dashboard')  }}">[Cancel]</a>
        </form>
    </body>
</html>
